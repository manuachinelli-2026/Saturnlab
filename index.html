<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pepino AI — Agentes de IA para tu negocio</title>
<meta name="description" content="Agentes de IA que trabajan en tu WhatsApp las 24 horas. Gestionan turnos, llenan tu agenda y cuidan a tus clientes. Frescos, rápidos, sin fricción.">
<link rel="stylesheet" href="./colors_and_type.css">
<link rel="icon" href="./assets/favicon.png" type="image/png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.6;
  }

  a { color: inherit; text-decoration: none; }

  .container { max-width: 1080px; margin: 0 auto; padding: 0 32px; }

  /* ---- Hero icon ---- */
  .hero-icon-wrap {
    display: flex; justify-content: center;
    margin-bottom: 36px;
    position: relative;
  }
  .hero-icon-wrap::before {
    content: '';
    position: absolute;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(160,255,121,0.13) 0%, transparent 68%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    animation: halo-pulse 3.5s ease-in-out infinite;
  }
  .hero-planet {
    width: 148px; height: 148px;
    border-radius: 30px;
    position: relative; z-index: 1;
    animation: planet-float 4s ease-in-out infinite,
               planet-glow  3.5s ease-in-out infinite;
  }

  @keyframes planet-float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-14px); }
  }
  @keyframes planet-glow {
    0%, 100% { filter: drop-shadow(0 12px 24px rgba(0,0,0,0.7)); }
    50%       { filter: drop-shadow(0 12px 24px rgba(0,0,0,0.7))
                        drop-shadow(0 0 36px rgba(160,255,121,0.38)); }
  }
  @keyframes halo-pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.12); }
  }

  /* ---- Nav ---- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(11, 14, 12, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    height: 66px;
  }
  .nav-links { justify-self: center; }
  .nav-right  { justify-self: end; margin-left: 0; }
  .brand {
    display: flex; align-items: center; gap: 11px;
    flex-shrink: 0;
  }
  .brand-text { display: flex; flex-direction: column; gap: 1px; }
  .brand-name {
    font-size: 17px; font-weight: 700;
    letter-spacing: -0.025em; line-height: 1;
    color: var(--text-1);
  }
  .brand-sub {
    font-family: var(--font-mono); font-size: 9.5px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--green); line-height: 1;
  }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    font-size: 14px; font-weight: 500;
    color: var(--text-2);
    transition: color var(--dur) var(--ease);
  }
  .nav-links a:hover { color: var(--text-1); }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font); font-size: 14px; font-weight: 600;
    padding: 11px 22px; border-radius: var(--r-md);
    border: none; cursor: pointer; letter-spacing: -0.01em;
    transition: all var(--dur) var(--ease);
    white-space: nowrap; text-decoration: none;
  }
  .btn:active { transform: translateY(1px); }

  .btn--green {
    background: var(--green); color: #0c200f;
  }
  .btn--green:hover {
    background: var(--green-hover);
    box-shadow: var(--shadow-green);
  }
  .btn--outline {
    background: transparent; color: var(--text-1);
    border: 1.5px solid var(--border-2);
  }
  .btn--outline:hover { border-color: var(--text-3); }
  .btn--lg { font-size: 15.5px; padding: 13px 28px; }

  /* ---- Hero ---- */
  .hero { padding: 96px 0 88px; text-align: center; }

  .eyebrow {
    display: inline-block;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--green); margin-bottom: 28px;
  }

  .hero h1 {
    font-size: clamp(42px, 6.5vw, 76px);
    font-weight: 800; letter-spacing: -0.045em;
    line-height: 1.0; margin-bottom: 24px;
    color: var(--text-1);
  }
  .hero h1 em { font-style: normal; color: var(--green); }

  .hero-lead {
    font-size: clamp(17px, 2vw, 20px);
    color: var(--text-2); line-height: 1.65;
    max-width: 540px; margin: 0 auto 40px;
  }

  .hero-actions {
    display: flex; gap: 14px;
    justify-content: center; flex-wrap: wrap;
  }

  /* ---- Section ---- */
  .section { padding: 80px 0; }

  .section-label {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--green); margin-bottom: 14px;
  }

  .section-title {
    font-size: clamp(28px, 3.6vw, 42px);
    font-weight: 700; letter-spacing: -0.035em;
    line-height: 1.1; margin-bottom: 14px;
    color: var(--text-1);
  }

  .section-sub {
    font-size: 17px; color: var(--text-2);
    line-height: 1.6; max-width: 500px; margin-bottom: 52px;
  }

  /* ---- Agent card header ---- */
  .card-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px;
  }
  .card-avatar {
    width: 60px; height: 60px; border-radius: 50%;
    border: 2px solid var(--green-border);
    flex-shrink: 0; overflow: hidden;
    background: var(--bg-card-hover);
  }
  .card-avatar-img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
    display: block;
  }
  .card-agent-info { display: flex; flex-direction: column; gap: 3px; }
  .card-name {
    font-size: 20px; font-weight: 700;
    letter-spacing: -0.025em; color: var(--text-1); line-height: 1;
  }
  .card-role {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3);
  }

  /* ---- Services ---- */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: stretch;
  }

  /* ---- Carousel ---- */
  .carousel-wrap { position: relative; }
  .carousel-track {
    display: flex; gap: 20px;
    overflow-x: auto; scroll-snap-type: x mandatory;
    scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .carousel-track .service-card {
    flex: 0 0 calc(33.333% - 14px); min-width: 280px;
    scroll-snap-align: start;
  }
  .carousel-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg-card); border: 1px solid var(--border-2);
    color: var(--text-1); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 5; transition: all var(--dur) var(--ease);
  }
  .carousel-btn:hover { border-color: var(--green); color: var(--green); }
  .carousel-btn--prev { left: -20px; }
  .carousel-btn--next { right: -20px; }
  @media (max-width: 860px) {
    .carousel-track .service-card { flex: 0 0 85%; }
    .carousel-btn { display: none; }
  }

  /* ---- Elton solo card (full-width) ---- */
  .service-card--solo {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 0;
    align-items: stretch;
    padding: 0;
    overflow: hidden;
  }
  .solo-left {
    background: var(--green-dim);
    border-right: 1px solid var(--border);
    padding: 32px 28px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; text-align: center;
  }
  .solo-avatar {
    width: 96px; height: 96px; border-radius: 50%;
    border: 3px solid var(--green-border);
    overflow: hidden; flex-shrink: 0;
  }
  .solo-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .solo-badge {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--green);
  }
  .solo-name {
    font-size: 28px; font-weight: 700;
    letter-spacing: -0.03em; color: var(--text-1); line-height: 1;
  }
  .solo-role {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3);
  }
  .solo-price-block { margin-top: 8px; }
  .solo-price {
    font-size: 36px; font-weight: 800;
    letter-spacing: -0.04em; color: var(--text-1); line-height: 1;
  }
  .solo-price-note { font-size: 12px; color: var(--text-3); margin-top: 2px; }

  .solo-right {
    padding: 32px 32px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .solo-tagline {
    font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--text-1); margin-bottom: 10px; line-height: 1.2;
  }
  .solo-desc {
    font-size: 15px; color: var(--text-2); line-height: 1.65;
    margin-bottom: 22px; max-width: 520px;
  }
  .solo-features {
    list-style: none; display: grid;
    grid-template-columns: 1fr 1fr; gap: 9px 24px;
    margin-bottom: 28px;
  }
  .solo-features li {
    display: flex; align-items: center; gap: 9px;
    font-size: 13.5px; color: var(--text-1);
  }
  .solo-features li::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
  }

  @media (max-width: 860px) {
    .service-card--solo {
      grid-column: 1;
      grid-template-columns: 1fr;
    }
    .solo-left { border-right: none; border-bottom: 1px solid var(--border); }
    .solo-features { grid-template-columns: 1fr; }
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 28px 26px 30px;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    transition: border-color var(--dur) var(--ease),
                transform var(--dur) var(--ease),
                box-shadow var(--dur) var(--ease);
  }
  .service-card:hover {
    border-color: var(--green-border);
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
  }
  .service-card--featured {
    border-color: rgba(160,255,121,0.22);
  }
  .service-card--featured::after {
    content: 'Más popular';
    position: absolute; top: 20px; right: 20px;
    font-family: var(--font-mono); font-size: 9.5px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--green); background: var(--green-dim);
    border: 1px solid var(--green-border);
    padding: 4px 9px; border-radius: 99px;
  }
  .service-card--featured::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 5%, var(--green) 40%, var(--green) 60%, transparent 95%);
  }

  .card-icon {
    width: 44px; height: 44px;
    background: var(--green-dim);
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px; color: var(--green);
    flex-shrink: 0;
  }
  .card-icon svg, .card-icon i { width: 21px; height: 21px; }

  .card-badge {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 7px;
  }

  .card-title {
    font-size: 19px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.2;
    margin-bottom: 11px; color: var(--text-1);
  }

  .card-desc {
    font-size: 14px; color: var(--text-2);
    line-height: 1.65; margin-bottom: 20px;
  }

  .card-features {
    list-style: none;
    display: flex; flex-direction: column; gap: 9px;
    margin-bottom: 28px;
  }
  .card-features li {
    display: flex; align-items: center; gap: 10px;
    font-size: 13.5px; color: var(--text-1);
  }
  .card-features li::before {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
  }

  .card-footer {
    margin-top: auto; padding-top: 22px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }

  .card-price { display: flex; flex-direction: column; gap: 2px; }
  .card-price-amount {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.04em; line-height: 1;
    color: var(--text-1);
  }
  .card-price-note {
    font-size: 12px; color: var(--text-3); font-weight: 400;
  }

  /* ---- CTA band ---- */
  .cta-band {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: 64px 56px;
    text-align: center;
    margin-bottom: 80px;
    position: relative; overflow: hidden;
  }
  .cta-band::before {
    content: '';
    position: absolute; top: 0; left: 25%; right: 25%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
  }
  .cta-band h2 {
    font-size: clamp(26px, 3vw, 38px);
    font-weight: 700; letter-spacing: -0.035em;
    margin-bottom: 14px; color: var(--text-1);
  }
  .cta-band p {
    font-size: 17px; color: var(--text-2); line-height: 1.6;
    max-width: 460px; margin: 0 auto 34px;
  }
  .cta-actions {
    display: flex; gap: 14px;
    justify-content: center; flex-wrap: wrap;
  }

  /* ---- Footer ---- */
  .footer {
    border-top: 1px solid var(--border);
    padding: 36px 0;
  }
  .footer-inner {
    display: flex; align-items: center;
    justify-content: space-between; gap: 24px;
    flex-wrap: wrap;
  }
  .footer-brand {
    display: flex; align-items: center; gap: 10px;
  }
  .footer-copy {
    font-size: 13px; color: var(--text-3);
  }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a {
    font-size: 13px; color: var(--text-3);
    transition: color var(--dur);
  }
  .footer-links a:hover { color: var(--text-1); }

  /* ---- Floating WhatsApp button ---- */
  .wa-float {
    position: fixed; bottom: 28px; right: 28px; z-index: 200;
    width: 62px; height: 62px; border-radius: 50%;
    background: var(--green); color: #0c200f;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(160,255,121,0.38), 0 2px 10px rgba(0,0,0,0.45);
    transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .wa-float:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 30px rgba(110,232,122,0.55), 0 2px 10px rgba(0,0,0,0.45);
  }
  .wa-float::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: var(--green); opacity: 0.45;
    animation: wa-pulse 2.6s ease-out infinite;
  }
  .wa-float svg {
    width: 30px; height: 30px;
    position: relative; z-index: 1; flex-shrink: 0;
  }
  @keyframes wa-pulse {
    0%   { transform: scale(1);   opacity: 0.45; }
    70%  { transform: scale(1.8); opacity: 0; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  /* ---- How it works ---- */
  .steps-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 32px; position: relative; }
  .steps-grid::before {
    content: '';
    position: absolute; top: 28px; left: 15%; right: 15%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-border), transparent);
  }
  .step { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; position: relative; z-index: 1; }
  .step-num {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--green-dim); border: 1.5px solid var(--green-border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: var(--green);
  }
  .step h3 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-1); }
  .step p  { font-size: 14px; color: var(--text-2); line-height: 1.6; }

  /* ---- Benefit sections ---- */
  .benefit-section { padding: 80px 0; }
  .benefit-section--alt { background: var(--bg-canvas, #0d110d); }
  .benefit-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 64px; align-items: center;
  }
  .benefit-grid--reverse .benefit-text { order: 2; }
  .benefit-grid--reverse .benefit-visual { order: 1; }
  .benefit-text { display: flex; flex-direction: column; gap: 0; }
  .benefit-text h2 {
    font-size: clamp(26px, 3vw, 38px); font-weight: 700;
    letter-spacing: -0.03em; line-height: 1.1;
    margin: 12px 0 16px; color: var(--text-1);
  }
  .benefit-text p { font-size: 16px; color: var(--text-2); line-height: 1.7; margin-bottom: 28px; }

  /* ---- Mockup cards (benefit visuals) ---- */
  .mockup-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow-card);
  }
  .mockup-topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .mockup-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--green-dim); border: 1px solid var(--green-border);
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .mockup-topbar-info { display: flex; flex-direction: column; gap: 1px; }
  .mockup-topbar-name { font-size: 13px; font-weight: 600; color: var(--text-1); line-height: 1; }
  .mockup-topbar-status { font-size: 11px; color: var(--green); }
  .mockup-topbar-time { margin-left: auto; font-size: 11px; color: var(--text-3); font-family: var(--font-mono); }
  .mockup-chat { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .chat-in {
    background: var(--bg-card-hover,#161B12); border-radius: 14px 14px 14px 4px;
    padding: 9px 13px; font-size: 13px; color: var(--text-1);
    max-width: 82%; align-self: flex-start;
  }
  .chat-out {
    background: var(--green-dim); border: 1px solid var(--green-border);
    border-radius: 14px 14px 4px 14px;
    padding: 9px 13px; font-size: 13px; color: var(--text-1);
    max-width: 82%; align-self: flex-end;
  }
  .chat-note { font-size: 10px; color: var(--text-3); text-align: right; font-style: italic; }

  .cal-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .cal-header span { font-size: 13px; font-weight: 600; color: var(--text-1); }
  .cal-header small { font-family: var(--font-mono); font-size: 10px; color: var(--green); }
  .cal-slots { padding: 10px 16px; display: flex; flex-direction: column; gap: 7px; }
  .cal-slot { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--r-md); }
  .cal-slot--filled { background: var(--green-dim); border: 1px solid var(--green-border); }
  .cal-slot--empty  { background: var(--bg-card-hover,#161B12); border: 1px dashed var(--border); opacity: 0.7; }
  .cal-slot-time { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); flex-shrink: 0; width: 40px; }
  .cal-slot-name { font-size: 13px; color: var(--text-1); flex: 1; }
  .cal-slot-tag  { font-size: 10px; font-family: var(--font-mono); color: var(--green); background: var(--green-dim); padding: 2px 7px; border-radius: 99px; }

  .stars-card { padding: 20px; }
  .stars-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .stars-logo { width: 36px; height: 36px; border-radius: var(--r-md); background: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #4285F4; flex-shrink: 0; }
  .stars-name { font-size: 13px; font-weight: 600; color: var(--text-1); }
  .stars-row { display: flex; gap: 3px; margin: 4px 0; }
  .star-fill { color: #f5a623; font-size: 16px; }
  .stars-count { font-size: 12px; color: var(--text-2); }
  .stars-bars { display: flex; flex-direction: column; gap: 5px; margin-top: 12px; }
  .stars-bar-row { display: flex; align-items: center; gap: 8px; }
  .stars-bar-label { font-size: 11px; color: var(--text-3); width: 12px; }
  .stars-bar-track { flex: 1; height: 6px; background: var(--bg-card-hover,#161B12); border-radius: 3px; overflow: hidden; }
  .stars-bar-fill  { height: 100%; background: var(--green); border-radius: 3px; }
  .stars-trend { display: flex; align-items: center; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--green); }

  /* ---- Why us ---- */
  .why-band { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 80px 0; }
  .why-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 32px; margin-top: 48px; }
  .why-card { padding: 28px 24px; border: 1px solid var(--border); border-radius: var(--r-lg); display: flex; flex-direction: column; gap: 14px; transition: border-color var(--dur) var(--ease); }
  .why-card:hover { border-color: var(--green-border); }
  .why-icon { width: 44px; height: 44px; background: var(--green-dim); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; color: var(--green); }
  .why-icon svg, .why-icon i { width: 22px; height: 22px; }
  .why-card h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-1); }
  .why-card p  { font-size: 14px; color: var(--text-2); line-height: 1.6; }

  /* ---- Testimonials ---- */
  .testimonials-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 0; }
  .testi-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 26px 24px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .testi-stars { display: flex; gap: 2px; color: #f5a623; font-size: 14px; }
  .testi-quote { font-size: 14.5px; line-height: 1.65; color: var(--text-1); font-style: italic; flex: 1; }
  .testi-quote::before { content: '"'; }
  .testi-quote::after  { content: '"'; }
  .testi-author { display: flex; flex-direction: column; gap: 2px; padding-top: 14px; border-top: 1px solid var(--border); }
  .testi-name { font-size: 13.5px; font-weight: 600; color: var(--text-1); }
  .testi-biz  { font-size: 12px; color: var(--text-3); font-family: var(--font-mono); }
  .testi-tag  { display: inline-block; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); background: var(--green-dim); border: 1px solid var(--green-border); padding: 3px 8px; border-radius: 99px; width: fit-content; }

  /* ---- FAQ ---- */
  .faq-list { display: flex; flex-direction: column; gap: 0; margin-top: 0; border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
  .faq-item { border-bottom: 1px solid var(--border); }
  .faq-item:last-child { border-bottom: none; }
  .faq-q {
    width: 100%; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; text-align: left; gap: 16px;
    font-family: var(--font); font-size: 15px; font-weight: 600;
    color: var(--text-1); transition: background var(--dur);
  }
  .faq-q:hover { background: var(--bg-card); }
  .faq-icon { font-size: 20px; color: var(--green); flex-shrink: 0; line-height: 1; font-weight: 300; }
  .faq-a { padding: 0 24px 20px; font-size: 14.5px; color: var(--text-2); line-height: 1.7; }

  @media (max-width: 860px) {
    .steps-grid { grid-template-columns: 1fr; }
    .steps-grid::before { display: none; }
    .benefit-grid { grid-template-columns: 1fr; }
    .benefit-grid--reverse .benefit-text { order: 0; }
    .benefit-grid--reverse .benefit-visual { order: 0; }
    .why-grid { grid-template-columns: 1fr; }
    .testimonials-grid { grid-template-columns: 1fr; }
  }

  /* ---- Blog ---- */
  .blog-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  }
  .blog-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 28px 26px 24px;
    display: flex; flex-direction: column;
    transition: border-color var(--dur) var(--ease),
                transform var(--dur) var(--ease),
                box-shadow var(--dur) var(--ease);
    cursor: pointer;
  }
  .blog-card:hover {
    border-color: var(--green-border);
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
  }
  .blog-card-body { flex: 1; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .blog-tag {
    display: inline-block; font-family: var(--font-mono); font-size: 9.5px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--green); background: var(--green-dim);
    border: 1px solid var(--green-border);
    padding: 4px 9px; border-radius: 99px; width: fit-content;
  }
  .blog-title {
    font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
    line-height: 1.25; color: var(--text-1);
  }
  .blog-excerpt { font-size: 13.5px; color: var(--text-2); line-height: 1.65; }
  .blog-card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .blog-meta { font-size: 12px; color: var(--text-3); font-family: var(--font-mono); }
  .blog-read-link { font-size: 13px; font-weight: 600; color: var(--green); }
  @media (max-width: 860px) { .blog-grid { grid-template-columns: 1fr; } }

  /* ---- Responsive ---- */
  @media (max-width: 860px) {
    .services-grid { grid-template-columns: 1fr; max-width: 500px; }
    .nav-links { display: none; }
    .nav-inner { display: flex; justify-content: space-between; }
    .hero { padding: 72px 0 64px; }
    .cta-band { padding: 44px 28px; }
    .section { padding: 64px 0; }
  }
  @media (max-width: 560px) {
    .container { padding: 0 18px; }
    .cta-band { margin-bottom: 56px; }
  }
</style>
