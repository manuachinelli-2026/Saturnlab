<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Saturno Web Studio — Diseño web, IA y gestión de citas para tu negocio</title>
<meta name="description" content="Diseñamos tu página web, creamos asistentes de IA para WhatsApp y automatizamos la gestión de tus citas. Tecnología al servicio de tu negocio en España.">
<link rel="stylesheet" href="./colors_and_type.css">
<link rel="icon" href="./assets/favicon.png" type="image/png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.6;
  }

  a { color: inherit; text-decoration: none; }

  .container { max-width: 1080px; margin: 0 auto; padding: 0 32px; }

  /* ---- Hero icon ---- */
  .hero-icon-wrap {
    display: flex; justify-content: center;
    margin-bottom: 36px;
    position: relative;
  }
  .hero-icon-wrap::before {
    content: '';
    position: absolute;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(110,232,122,0.13) 0%, transparent 68%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    animation: halo-pulse 3.5s ease-in-out infinite;
  }
  .hero-planet {
    width: 148px; height: 148px;
    border-radius: 30px;
    position: relative; z-index: 1;
    animation: planet-float 4s ease-in-out infinite,
               planet-glow  3.5s ease-in-out infinite;
  }

  @keyframes planet-float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-14px); }
  }
  @keyframes planet-glow {
    0%, 100% { box-shadow: 0 10px 40px rgba(0,0,0,0.55); }
    50%       { box-shadow: 0 10px 40px rgba(0,0,0,0.55),
                            0 0 48px rgba(110,232,122,0.28); }
  }
  @keyframes halo-pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.12); }
  }

  /* ---- Nav ---- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(19, 19, 26, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    display: flex; align-items: center; gap: 32px; height: 66px;
  }
  .brand {
    display: flex; align-items: center; gap: 11px;
    flex-shrink: 0;
  }
  .brand-text { display: flex; flex-direction: column; gap: 1px; }
  .brand-name {
    font-size: 17px; font-weight: 700;
    letter-spacing: -0.025em; line-height: 1;
    color: var(--text-1);
  }
  .brand-sub {
    font-family: var(--font-mono); font-size: 9.5px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--green); line-height: 1;
  }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    font-size: 14px; font-weight: 500;
    color: var(--text-2);
    transition: color var(--dur) var(--ease);
  }
  .nav-links a:hover { color: var(--text-1); }
  .nav-right { margin-left: auto; }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font); font-size: 14px; font-weight: 600;
    padding: 11px 22px; border-radius: var(--r-md);
    border: none; cursor: pointer; letter-spacing: -0.01em;
    transition: all var(--dur) var(--ease);
    white-space: nowrap; text-decoration: none;
  }
  .btn:active { transform: translateY(1px); }

  .btn--green {
    background: var(--green); color: #0c200f;
  }
  .btn--green:hover {
    background: var(--green-hover);
    box-shadow: var(--shadow-green);
  }
  .btn--outline {
    background: transparent; color: var(--text-1);
    border: 1.5px solid var(--border-2);
  }
  .btn--outline:hover { border-color: var(--text-3); }
  .btn--lg { font-size: 15.5px; padding: 13px 28px; }

  /* ---- Hero ---- */
  .hero { padding: 96px 0 88px; text-align: center; }

  .eyebrow {
    display: inline-block;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--green); margin-bottom: 28px;
  }

  .hero h1 {
    font-size: clamp(42px, 6.5vw, 76px);
    font-weight: 800; letter-spacing: -0.045em;
    line-height: 1.0; margin-bottom: 24px;
    color: var(--text-1);
  }
  .hero h1 em { font-style: normal; color: var(--green); }

  .hero-lead {
    font-size: clamp(17px, 2vw, 20px);
    color: var(--text-2); line-height: 1.65;
    max-width: 540px; margin: 0 auto 40px;
  }

  .hero-actions {
    display: flex; gap: 14px;
    justify-content: center; flex-wrap: wrap;
  }

  /* ---- Section ---- */
  .section { padding: 80px 0; }

  .section-label {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--green); margin-bottom: 14px;
  }

  .section-title {
    font-size: clamp(28px, 3.6vw, 42px);
    font-weight: 700; letter-spacing: -0.035em;
    line-height: 1.1; margin-bottom: 14px;
    color: var(--text-1);
  }

  .section-sub {
    font-size: 17px; color: var(--text-2);
    line-height: 1.6; max-width: 500px; margin-bottom: 52px;
  }

  /* ---- Agent card header ---- */
  .card-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px;
  }
  .card-avatar {
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--green-dim);
    border: 1.5px solid var(--green-border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-avatar-initial {
    font-size: 22px; font-weight: 800;
    color: var(--green); letter-spacing: -0.02em; line-height: 1;
  }
  .card-agent-info { display: flex; flex-direction: column; gap: 3px; }
  .card-name {
    font-size: 20px; font-weight: 700;
    letter-spacing: -0.025em; color: var(--text-1); line-height: 1;
  }
  .card-role {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3);
  }

  /* ---- Services ---- */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: stretch;
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 28px 26px 30px;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    transition: border-color var(--dur) var(--ease),
                transform var(--dur) var(--ease),
                box-shadow var(--dur) var(--ease);
  }
  .service-card:hover {
    border-color: var(--green-border);
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
  }
  .service-card--featured {
    border-color: rgba(110, 232, 122, 0.22);
  }
  .service-card--featured::after {
    content: 'Más popular';
    position: absolute; top: 20px; right: 20px;
    font-family: var(--font-mono); font-size: 9.5px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--green); background: var(--green-dim);
    border: 1px solid var(--green-border);
    padding: 4px 9px; border-radius: 99px;
  }
  .service-card--featured::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 5%, var(--green) 40%, var(--green) 60%, transparent 95%);
  }

  .card-icon {
    width: 44px; height: 44px;
    background: var(--green-dim);
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px; color: var(--green);
    flex-shrink: 0;
  }
  .card-icon svg, .card-icon i { width: 21px; height: 21px; }

  .card-badge {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 7px;
  }

  .card-title {
    font-size: 19px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.2;
    margin-bottom: 11px; color: var(--text-1);
  }

  .card-desc {
    font-size: 14px; color: var(--text-2);
    line-height: 1.65; margin-bottom: 20px;
  }

  .card-features {
    list-style: none;
    display: flex; flex-direction: column; gap: 9px;
    margin-bottom: 28px;
  }
  .card-features li {
    display: flex; align-items: center; gap: 10px;
    font-size: 13.5px; color: var(--text-1);
  }
  .card-features li::before {
    content: '';
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
  }

  .card-footer {
    margin-top: auto; padding-top: 22px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }

  .card-price { display: flex; flex-direction: column; gap: 2px; }
  .card-price-amount {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.04em; line-height: 1;
    color: var(--text-1);
  }
  .card-price-note {
    font-size: 12px; color: var(--text-3); font-weight: 400;
  }

  /* ---- CTA band ---- */
  .cta-band {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: 64px 56px;
    text-align: center;
    margin-bottom: 80px;
    position: relative; overflow: hidden;
  }
  .cta-band::before {
    content: '';
    position: absolute; top: 0; left: 25%; right: 25%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
  }
  .cta-band h2 {
    font-size: clamp(26px, 3vw, 38px);
    font-weight: 700; letter-spacing: -0.035em;
    margin-bottom: 14px; color: var(--text-1);
  }
  .cta-band p {
    font-size: 17px; color: var(--text-2); line-height: 1.6;
    max-width: 460px; margin: 0 auto 34px;
  }
  .cta-actions {
    display: flex; gap: 14px;
    justify-content: center; flex-wrap: wrap;
  }

  /* ---- Footer ---- */
  .footer {
    border-top: 1px solid var(--border);
    padding: 36px 0;
  }
  .footer-inner {
    display: flex; align-items: center;
    justify-content: space-between; gap: 24px;
    flex-wrap: wrap;
  }
  .footer-brand {
    display: flex; align-items: center; gap: 10px;
  }
  .footer-copy {
    font-size: 13px; color: var(--text-3);
  }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a {
    font-size: 13px; color: var(--text-3);
    transition: color var(--dur);
  }
  .footer-links a:hover { color: var(--text-1); }

  /* ---- Floating WhatsApp button ---- */
  .wa-float {
    position: fixed; bottom: 28px; right: 28px; z-index: 200;
    width: 62px; height: 62px; border-radius: 50%;
    background: var(--green); color: #0c200f;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(110,232,122,0.38), 0 2px 10px rgba(0,0,0,0.45);
    transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .wa-float:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 30px rgba(110,232,122,0.55), 0 2px 10px rgba(0,0,0,0.45);
  }
  .wa-float::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: var(--green); opacity: 0.45;
    animation: wa-pulse 2.6s ease-out infinite;
  }
  .wa-float svg {
    width: 30px; height: 30px;
    position: relative; z-index: 1; flex-shrink: 0;
  }
  @keyframes wa-pulse {
    0%   { transform: scale(1);   opacity: 0.45; }
    70%  { transform: scale(1.8); opacity: 0; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  /* ---- Responsive ---- */
  @media (max-width: 860px) {
    .services-grid { grid-template-columns: 1fr; max-width: 500px; }
    .nav-links { display: none; }
    .hero { padding: 72px 0 64px; }
    .cta-band { padding: 44px 28px; }
    .section { padding: 64px 0; }
  }
  @media (max-width: 560px) {
    .container { padding: 0 18px; }
    .cta-band { margin-bottom: 56px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="text/babel" src="./components.jsx"></script>
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
